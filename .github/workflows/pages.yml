name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Job-level permissions are set explicitly to ensure the token can create/update Pages
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Use a PAT from secrets.GH_PAGES_PAT if provided (useful when org settings restrict GITHUB_TOKEN),
          # otherwise fall back to the built-in github.token (GITHUB_TOKEN).
          token: ${{ secrets.GH_PAGES_PAT || github.token }}
